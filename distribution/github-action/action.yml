name: CapabilityProof Agent Skill receipt
description: Generate a non-executing exact-version Capability Receipt for one Agent Skill directory.
inputs:
  skill-path:
    description: Relative path below GITHUB_WORKSPACE to the Agent Skill directory.
    required: true
runs:
  using: composite
  steps:
    - name: Install pinned CapabilityProof checkout
      shell: bash
      env:
        CAPABILITYPROOF_ACTION_PATH: ${{ github.action_path }}
      run: python -m pip install "$CAPABILITYPROOF_ACTION_PATH/../.."
    - name: Generate receipt
      shell: bash
      env:
        CAPABILITYPROOF_SKILL_PATH: ${{ inputs.skill-path }}
      run: >-
        capabilityproof inspect "$CAPABILITYPROOF_SKILL_PATH"
        --allow-root "$GITHUB_WORKSPACE"
        --output "$GITHUB_WORKSPACE/capability-receipt.json"
