name: VouchSpec publisher CI receipt draft
description: Bind a non-executing Agent Skill receipt draft to the exact publisher repository commit and workflow context.
inputs:
  skill-path:
    description: Relative path below GITHUB_WORKSPACE to the Agent Skill directory.
    required: true
outputs:
  receipt-path:
    description: Absolute path to the exact receipt draft that the publisher should attest.
    value: ${{ steps.paths.outputs.receipt-path }}
  ci-request-path:
    description: Absolute path to workflow/commit binding metadata that the publisher should attest.
    value: ${{ steps.paths.outputs.ci-request-path }}
runs:
  using: composite
  steps:
    - name: Install pinned VouchSpec action checkout
      shell: bash
      env:
        VOUCHSPEC_ACTION_PATH: ${{ github.action_path }}
      run: python -m pip install "$VOUCHSPEC_ACTION_PATH/../.."
    - name: Verify exact checkout context
      shell: bash
      env:
        VOUCHSPEC_EXPECTED_COMMIT: ${{ github.sha }}
      run: |
        set -euo pipefail
        test "$(git -C "$GITHUB_WORKSPACE" rev-parse HEAD)" = "$VOUCHSPEC_EXPECTED_COMMIT"
        test -z "$(git -C "$GITHUB_WORKSPACE" status --porcelain=v1 --untracked-files=all)"
    - name: Generate exact Git-bound receipt draft
      shell: bash
      env:
        VOUCHSPEC_SKILL_PATH: ${{ inputs.skill-path }}
      run: |
        set -euo pipefail
        mkdir -p "$RUNNER_TEMP/vouchspec-publisher-ci"
        vouchspec inspect-git "$GITHUB_WORKSPACE/$VOUCHSPEC_SKILL_PATH" \
          --repository-root "$GITHUB_WORKSPACE" \
          --compact \
          --output "$RUNNER_TEMP/vouchspec-publisher-ci/receipt.json"
    - name: Record workflow and receipt binding
      id: paths
      shell: bash
      env:
        VOUCHSPEC_REPOSITORY: ${{ github.repository }}
        VOUCHSPEC_COMMIT: ${{ github.sha }}
        VOUCHSPEC_WORKFLOW_REF: ${{ github.workflow_ref }}
        VOUCHSPEC_WORKFLOW: ${{ github.workflow }}
        VOUCHSPEC_RUN_ID: ${{ github.run_id }}
        VOUCHSPEC_RUN_ATTEMPT: ${{ github.run_attempt }}
        VOUCHSPEC_ACTION_REPOSITORY: ${{ github.action_repository }}
        VOUCHSPEC_ACTION_REF: ${{ github.action_ref }}
      run: |
        set -euo pipefail
        python - <<'PY'
        import hashlib
        import json
        import os
        from pathlib import Path

        root = Path(os.environ["RUNNER_TEMP"]) / "vouchspec-publisher-ci"
        receipt = root / "receipt.json"
        statement = {
            "schema_version": "1.0.0",
            "profile": "vouchspec-publisher-ci-request-v1",
            "repository": os.environ["VOUCHSPEC_REPOSITORY"],
            "commit": os.environ["VOUCHSPEC_COMMIT"],
            "workflow_ref": os.environ["VOUCHSPEC_WORKFLOW_REF"],
            "workflow": os.environ["VOUCHSPEC_WORKFLOW"],
            "run_id": os.environ["VOUCHSPEC_RUN_ID"],
            "run_attempt": os.environ["VOUCHSPEC_RUN_ATTEMPT"],
            "action_repository": os.environ["VOUCHSPEC_ACTION_REPOSITORY"],
            "action_ref": os.environ["VOUCHSPEC_ACTION_REF"],
            "receipt_sha256": hashlib.sha256(receipt.read_bytes()).hexdigest(),
        }
        request = root / "publisher-ci-request.json"
        request.write_text(json.dumps(statement, sort_keys=True, separators=(",", ":")) + "\n", encoding="utf-8", newline="\n")
        output = Path(os.environ["GITHUB_OUTPUT"])
        with output.open("a", encoding="utf-8", newline="\n") as stream:
            stream.write(f"receipt-path={receipt}\n")
            stream.write(f"ci-request-path={request}\n")
        PY
