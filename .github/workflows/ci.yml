name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            distribution/remedy-executor/package-lock.json
            distribution/remedy-provisioner/package-lock.json
      - run: python -m pip install -e ".[dev]"
      - run: pytest
      - run: npm ci --ignore-scripts --prefix distribution/remedy-executor
      - run: npm test --prefix distribution/remedy-executor
      - run: npm ci --ignore-scripts --prefix distribution/remedy-provisioner
      - run: npm test --prefix distribution/remedy-provisioner
      - run: vouchspec inspect distribution/verify-before-install --generated-at 2026-07-14T03:00:00Z --output /tmp/verify-before-install-receipt.json
