name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            distribution/remedy-executor/package-lock.json
            distribution/remedy-provisioner/package-lock.json
      - run: python -m pip install -e ".[dev]"
      - name: Validate the MCP Registry manifest against the pinned official schema
        env:
          MCP_SCHEMA_SHA256: 3fba09590c99f61735d234822279f4223fab9e300c0a81e81c91ab62a4114de0
        run: |
          set -euo pipefail
          curl --fail --location --proto '=https' --tlsv1.2 \
            --retry 3 --retry-delay 2 --retry-all-errors --connect-timeout 10 --max-time 60 \
            https://static.modelcontextprotocol.io/schemas/2025-12-11/server.schema.json \
            --output /tmp/mcp-server.schema.json
          echo "${MCP_SCHEMA_SHA256}  /tmp/mcp-server.schema.json" | sha256sum --check --strict
          python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema.validators import validator_for

          schema = json.loads(Path("/tmp/mcp-server.schema.json").read_text(encoding="utf-8"))
          manifest = json.loads(Path("server.json").read_text(encoding="utf-8"))
          validator = validator_for(schema)
          validator.check_schema(schema)
          validator(schema).validate(manifest)
          PY
      - run: pytest
      - run: npm ci --ignore-scripts --prefix distribution/remedy-executor
      - run: npm test --prefix distribution/remedy-executor
      - run: npm ci --ignore-scripts --prefix distribution/remedy-provisioner
      - run: npm test --prefix distribution/remedy-provisioner
      - run: vouchspec inspect skills/vouchspec-verify-before-install --generated-at 2026-07-14T03:00:00Z --output /tmp/verify-before-install-receipt.json
