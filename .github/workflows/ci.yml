name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: pytest
      - run: capabilityproof inspect distribution/verify-before-install --generated-at 2026-07-14T03:00:00Z --output /tmp/verify-before-install-receipt.json
