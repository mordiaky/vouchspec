name: Publish MCP Registry manifest

on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: publish-mcp-registry
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository == 'mordiaky/vouchspec' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out the reviewed main branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install the pinned official MCP publisher
        env:
          MCP_PUBLISHER_VERSION: v1.8.0
          MCP_PUBLISHER_SHA256: 1370446bbe74d562608e8005a6ccce02d146a661fbd78674e11cc70b9618d6cf
        run: |
          set -euo pipefail
          archive=mcp-publisher_linux_amd64.tar.gz
          curl --fail --location --proto '=https' --tlsv1.2 \
            --retry 3 --retry-delay 2 --retry-all-errors --connect-timeout 10 --max-time 60 \
            "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/${archive}" \
            --output "${archive}"
          echo "${MCP_PUBLISHER_SHA256}  ${archive}" | sha256sum --check --strict
          tar --extract --gzip --file "${archive}" mcp-publisher
          chmod 0755 mcp-publisher

      - name: Authenticate with GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Publish the reviewed remote manifest
        run: ./mcp-publisher publish
