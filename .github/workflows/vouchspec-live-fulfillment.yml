name: VouchSpec mainnet fulfillment

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read

concurrency:
  group: vouchspec-mainnet-fulfillment
  cancel-in-progress: false

jobs:
  fulfill-one-paid-order:
    if: vars.VOUCHSPEC_LIVE_FULFILLMENT_ENABLED == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    environment: vouchspec-mainnet
    steps:
      - name: Claim one paid job before allocating build work
        id: claim
        env:
          VOUCHSPEC_API_BASE_URL: ${{ vars.VOUCHSPEC_API_BASE_URL }}
          VOUCHSPEC_WORKER_TOKEN: ${{ secrets.VOUCHSPEC_WORKER_TOKEN }}
        run: |
          set -euo pipefail
          claim_file="$RUNNER_TEMP/vouchspec-live-claim-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.json"
          echo "VOUCHSPEC_PRECLAIMED_JOB=$claim_file" >> "$GITHUB_ENV"
          worker_token="${VOUCHSPEC_WORKER_TOKEN//$'\r'/}"
          worker_token="${worker_token//$'\n'/}"
          status="$(curl --proto '=https' --tlsv1.2 --noproxy '*' \
            --connect-timeout 10 --max-time 30 --max-redirs 0 --max-filesize 1000000 \
            --silent --show-error --output "$claim_file" --write-out '%{http_code}' \
            --request POST "$VOUCHSPEC_API_BASE_URL/api/vouchspec/v1/internal/fulfillment/claim" \
            --header "Authorization: Bearer $worker_token" \
            --header 'Content-Type: application/json' \
            --header 'Accept: application/json' \
            --header 'X-VouchSpec-Worker-Id: github-actions-live' \
            --data-binary '{"worker_version":"vouchspec-stage-b-worker-v1"}')"
          echo "VouchSpec live claim HTTP status: $status"
          if [[ "$status" == "200" ]]; then
            if [[ ! -s "$claim_file" ]]; then
              echo "VouchSpec returned 200 without a claim document." >&2
              exit 1
            fi
            echo "has_job=true" >> "$GITHUB_OUTPUT"
          elif [[ "$status" == "204" ]]; then
            rm -f -- "$claim_file"
            echo "has_job=false" >> "$GITHUB_OUTPUT"
          else
            rm -f -- "$claim_file"
            echo "VouchSpec claim returned unexpected HTTP status $status." >&2
            exit 1
          fi
      - if: steps.claim.outputs.has_job == 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - if: steps.claim.outputs.has_job == 'true'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: distribution/github-action/requirements-linux-x86_64-py311.lock
      - name: Install hash-locked host runtime
        if: steps.claim.outputs.has_job == 'true'
        run: |
          set -euo pipefail
          python -m pip install \
            --disable-pip-version-check \
            --only-binary=:all: \
            --require-hashes \
            -r distribution/github-action/requirements-linux-x86_64-py311.lock
          python -m pip install --no-deps --no-build-isolation .
      - name: Build immutable local worker image
        if: steps.claim.outputs.has_job == 'true'
        id: worker-image
        run: |
          set -euo pipefail
          docker build --pull --tag "vouchspec-live-worker:${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --file distribution/stage-b-worker/Dockerfile .
          image="$(docker image inspect "vouchspec-live-worker:${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" --format '{{.Id}}')"
          case "$image" in sha256:????????????????????????????????????????????????????????????????) ;; *) exit 1 ;; esac
          echo "image=$image" >> "$GITHUB_OUTPUT"
      - name: Build immutable kernel-quota fetcher image
        if: steps.claim.outputs.has_job == 'true'
        id: fetcher-image
        run: |
          set -euo pipefail
          docker build --pull --tag "vouchspec-live-fetcher:${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --file distribution/stage-b-fetcher/Dockerfile .
          image="$(docker image inspect "vouchspec-live-fetcher:${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" --format '{{.Id}}')"
          case "$image" in sha256:????????????????????????????????????????????????????????????????) ;; *) exit 1 ;; esac
          echo "image=$image" >> "$GITHUB_OUTPUT"
      - name: Materialize encrypted live signing identity
        if: steps.claim.outputs.has_job == 'true'
        env:
          ISSUER_PRIVATE_KEY_B64: ${{ secrets.VOUCHSPEC_ISSUER_PRIVATE_KEY_B64 }}
          ISSUER_PASSPHRASE_B64: ${{ secrets.VOUCHSPEC_ISSUER_PASSPHRASE_B64 }}
          ISSUER_PUBLIC_JWK_B64: ${{ secrets.VOUCHSPEC_ISSUER_PUBLIC_JWK_B64 }}
        run: |
          set -euo pipefail
          umask 077
          secret_dir="$RUNNER_TEMP/vouchspec-live-issuer-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          work_root="$RUNNER_TEMP/vouchspec-live-work-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          mkdir "$secret_dir"
          printf '%s' "$ISSUER_PRIVATE_KEY_B64" | base64 --decode > "$secret_dir/issuer-private.pem"
          printf '%s' "$ISSUER_PASSPHRASE_B64" | base64 --decode > "$secret_dir/issuer-passphrase"
          printf '%s' "$ISSUER_PUBLIC_JWK_B64" | base64 --decode > "$secret_dir/issuer-public.jwk.json"
          test -s "$secret_dir/issuer-private.pem"
          test -s "$secret_dir/issuer-passphrase"
          test -s "$secret_dir/issuer-public.jwk.json"
          echo "VOUCHSPEC_SECRET_DIR=$secret_dir" >> "$GITHUB_ENV"
          echo "VOUCHSPEC_WORK_ROOT=$work_root" >> "$GITHUB_ENV"
      - name: Claim, isolate, sign, and deliver one paid request
        if: steps.claim.outputs.has_job == 'true'
        env:
          PYTHONPATH: ${{ github.workspace }}/src
          VOUCHSPEC_API_BASE_URL: ${{ vars.VOUCHSPEC_API_BASE_URL }}
          VOUCHSPEC_WORKER_TOKEN: ${{ secrets.VOUCHSPEC_WORKER_TOKEN }}
          VOUCHSPEC_WORKER_ID: github-actions-live
          VOUCHSPEC_WORKER_IMAGE: ${{ steps.worker-image.outputs.image }}
          VOUCHSPEC_FETCHER_IMAGE: ${{ steps.fetcher-image.outputs.image }}
          VOUCHSPEC_ISSUER_PRIVATE_KEY: ${{ env.VOUCHSPEC_SECRET_DIR }}/issuer-private.pem
          VOUCHSPEC_ISSUER_PASSPHRASE: ${{ env.VOUCHSPEC_SECRET_DIR }}/issuer-passphrase
          VOUCHSPEC_ISSUER_PUBLIC_KEY: ${{ env.VOUCHSPEC_SECRET_DIR }}/issuer-public.jwk.json
        run: python -I -m capabilityproof.hosted_worker
      - name: Remove ephemeral worker material
        if: always()
        run: |
          set -euo pipefail
          for path in "${VOUCHSPEC_SECRET_DIR:-}" "${VOUCHSPEC_WORK_ROOT:-}" "${VOUCHSPEC_PRECLAIMED_JOB:-}"; do
            case "$path" in "$RUNNER_TEMP"/vouchspec-live-*) rm -rf -- "$path" ;; "") ;; *) exit 1 ;; esac
          done
